<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교수님 프로필 및 링크 모음</title>
    <style>
        /* 기본 스타일 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif; /* 깔끔한 한글 폰트 */
            background-color: #f0f8ff; /* 연한 파란색 배경 */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 중앙 컨테이너 스타일 */
        .container {
            background-color: #fff; /* 흰색 배경 */
            padding: 40px;
            border-radius: 20px; /* 둥근 모서리 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* 은은한 그림자 */
            text-align: center;
            width: 90%;
            max-width: 500px; /* 최대 너비 제한 */
        }

        /* 프로필 섹션 스타일 */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* 원형 이미지 */
            background-color: #e0e0e0; /* 이미지 없을 때 회색 배경 */
            margin-bottom: 20px;
            object-fit: cover; /* 이미지 비율 유지 */
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .profile-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        /* 링크 버튼 스타일 */
        .link-button {
            display: block;
            background-color: #fff; /* 흰색 버튼 배경 */
            color: #007bff; /* 파란색 글자 */
            border: 2px solid #007bff; /* 파란색 테두리 */
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 30px; /* 둥근 버튼 */
            text-decoration: none; /* 밑줄 제거 */
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease; /* 호버 효과 애니메이션 */
        }

        /* 버튼 호버 효과 (마우스 올렸을 때) */
        .link-button:hover {
            background-color: #007bff; /* 파란색 배경으로 변경 */
            color: #fff; /* 흰색 글자로 변경 */
            transform: translateY(-3px); /* 살짝 위로 이동 */
            box-shadow: 0 5px 15px rgba(0,123,255,0.3); /* 푸른 그림자 추가 */
        }

        /* 하단 푸터 스타일 */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #999;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="profile-img"></div> <h1 class="profile-name">홍길동 교수</h1>
        <p class="profile-desc">컴퓨터공학과 | 연구 및 수업 자료 모음</p>

        <a href="https://your-seat-app.streamlit.app" target="_blank" class="link-button">🪑 학생 자리 배치 프로그램</a>
        <a href="https://your-calc-app.streamlit.app" target="_blank" class="link-button">🧮 수업용 계산기 도구</a>
        <a href="https://id.github.io/lecture-notes" target="_blank" class="link-button">📝 강의 자료실 (GitHub Pages)</a>
        <a href="mailto:professor@university.ac.kr" class="link-button">📧 이메일 문의하기</a>

        <p class="footer">&copy; 2023 Hong Gildong. All rights reserved.</p>
    </div>

</body>
</html>
